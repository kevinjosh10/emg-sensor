<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SynapseLink Dashboard</title>

  <!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  FIREBASE MODULAR SDK  (v10 — ESM via CDN, no npm/bundler needed)   ║
  ║                                                                      ║
  ║  We use type="module" on the main <script> tag below so we can      ║
  ║  import { ... } from these CDN URLs directly in the browser.        ║
  ║                                                                      ║
  ║  Modules loaded:                                                     ║
  ║    • firebase/app      — core initialisation                        ║
  ║    • firebase/database — Realtime Database read/write               ║
  ║    • firebase/analytics— page-view analytics (optional)             ║
  ╚══════════════════════════════════════════════════════════════════════╝
  NOTE: No <script src="..."> tags needed for modular SDK —
        all imports live inside the type="module" script at the bottom.
  -->

  <!-- Chart.js — loaded as a classic script so it is globally available -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- ═══════════════════════════════════════════════════════════════
       STYLES — UNCHANGED
       ═══════════════════════════════════════════════════════════════ -->
  <style>
    /* ── Design tokens ─────────────────────────────────────────── */
    :root {
      --bg:           #080809;
      --surface:      #0f0f12;
      --surface2:     #16161c;
      --border:       #1f1f28;
      --border-hi:    #2e2e3d;
      --text:         #c8c8d8;
      --text-dim:     #4a4a62;
      --text-muted:   #6b6b88;
      --eye:          #38b6ff;
      --fist:         #ff5c38;
      --ok:           #22c97a;
      --warn:         #f4c430;
      --err:          #ff3b3b;
      --dbl:          #c07fff;
      --mono:         'JetBrains Mono', monospace;
      --display:      'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.55; }
    button { font-family: inherit; }

    #app {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      min-height: 100vh;
    }

    /* ── Top bar ───────────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .tb-left { display: flex; align-items: baseline; gap: 12px; }
    .tb-title { font-family: var(--display); font-size: 15px; font-weight: 700; letter-spacing: 0.02em; color: #fff; }
    .tb-sub { font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }
    .tb-right { display: flex; align-items: center; gap: 20px; }

    .conn-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
      font-size: 11px; font-weight: 500; color: var(--text-muted);
      transition: border-color .3s, color .3s;
    }
    .conn-pill.online  { border-color: rgba(34,201,122,.35); color: var(--ok); }
    .conn-pill.offline { border-color: rgba(255,59,59,.25);  color: var(--err); }
    .conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--err); transition: background .3s, box-shadow .3s; }
    .conn-pill.online  .conn-dot { background: var(--ok); box-shadow: 0 0 5px var(--ok); }
    .conn-pill.offline .conn-dot { background: var(--err); }

    .lat-chip { font-size: 11px; color: var(--text-muted); }
    .lat-chip b { color: var(--warn); font-weight: 600; }

    /* ── Direction strip ───────────────────────────────────────── */
    #dir-strip {
      display: flex; align-items: center; gap: 16px;
      padding: 8px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .ds-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim); }
    .dir-arrows { display: flex; gap: 6px; }
    .dir-btn {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px; border: 1px solid var(--border);
      font-size: 13px; color: var(--text-dim); transition: all .15s;
    }
    .dir-btn.active { background: rgba(56,182,255,.1); border-color: rgba(56,182,255,.5); color: var(--eye); }
    .ds-text { font-size: 11px; color: var(--text-muted); margin-left: auto; }
    .ds-text strong { color: var(--eye); }

    .det-badges { display: flex; gap: 8px; }
    .det-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 3px; font-size: 10px; font-weight: 500;
      letter-spacing: .05em; text-transform: uppercase;
      opacity: 0; transition: opacity .15s; pointer-events: none;
    }
    .det-badge.show { opacity: 1; }
    .det-badge.b-eye  { background: rgba(56,182,255,.12);  color: var(--eye);  border: 1px solid rgba(56,182,255,.3); }
    .det-badge.b-fist { background: rgba(255,92,56,.12);   color: var(--fist); border: 1px solid rgba(255,92,56,.3); }
    .det-badge.b-dbl  { background: rgba(192,127,255,.12); color: var(--dbl);  border: 1px solid rgba(192,127,255,.3); }

    /* ── Main grid ─────────────────────────────────────────────── */
    #main { display: flex; flex-direction: column; gap: 16px; padding: 16px 24px; overflow-y: auto; }
    .panel-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* ── Signal panel card ─────────────────────────────────────── */
    .sig-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .sc-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
    }
    .sc-title { font-family: var(--display); font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
    .sc-title.eye-col  { color: var(--eye); }
    .sc-title.fist-col { color: var(--fist); }
    .sc-live { display: flex; align-items: baseline; gap: 5px; }
    .sc-val { font-size: 22px; font-weight: 600; line-height: 1; }
    .sc-val.eye-col  { color: var(--eye); }
    .sc-val.fist-col { color: var(--fist); }
    .sc-unit { font-size: 9px; color: var(--text-dim); letter-spacing: .06em; }

    .sc-chart { padding: 10px 14px 6px; height: 190px; position: relative; }
    .sc-chart canvas { display: block; }

    .sc-thresh {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px 12px; border-top: 1px solid var(--border);
    }
    .thr-label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim); min-width: 95px; }
    input[type="range"] {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 2px; border-radius: 2px; background: var(--border-hi); outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 13px; height: 13px; border-radius: 50%; cursor: pointer; transition: transform .1s;
    }
    input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.3); }
    .eye-range::-webkit-slider-thumb  { background: var(--eye);  }
    .fist-range::-webkit-slider-thumb { background: var(--fist); }
    .thr-val { font-size: 11px; min-width: 32px; text-align: right; }
    .thr-val.eye-col  { color: var(--eye); }
    .thr-val.fist-col { color: var(--fist); }

    /* ── Event log ─────────────────────────────────────────────── */
    .log-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .lc-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px; border-bottom: 1px solid var(--border);
    }
    .lc-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--text-muted); }
    .lc-meta { display: flex; align-items: center; gap: 14px; }
    .fb-sync { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-dim); }
    .fb-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-dim); transition: background .25s, box-shadow .25s; }
    .fb-dot.pulse { background: var(--ok); box-shadow: 0 0 5px var(--ok); }
    .ev-count { font-size: 10px; color: var(--text-dim); }
    .ev-count b { color: var(--text-muted); }

    #log-body { height: 150px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    #log-body::-webkit-scrollbar       { width: 3px; }
    #log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-row {
      display: grid; grid-template-columns: 74px 1fr; gap: 8px;
      padding: 3px 14px; font-size: 11px; line-height: 1.7; animation: slideIn .18s ease;
    }
    .log-row:hover { background: rgba(255,255,255,.02); }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: none; } }
    .log-ts  { color: var(--text-dim); }
    .log-txt { color: var(--text); }
    .log-txt .c-eye  { color: var(--eye); }
    .log-txt .c-fist { color: var(--fist); }
    .log-txt .c-dir  { color: var(--warn); }
    .log-txt .c-dbl  { color: var(--dbl); }
    .log-txt .c-ok   { color: var(--ok); }
    .log-txt .c-err  { color: var(--err); }

    /* ── Footer ────────────────────────────────────────────────── */
    #footer {
      padding: 8px 24px; border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; font-size: 10px; color: var(--text-dim);
    }
  </style>
</head>

<body>
<div id="app">

  <!-- ══════════════════════════════════════════════════════════════
       TOP BAR — UNCHANGED
       ══════════════════════════════════════════════════════════════ -->
  <header id="topbar">
    <div class="tb-left">
      <span class="tb-title">SynapseLink</span>
      <span class="tb-sub">EMG Dashboard · Realtime DB</span>
    </div>
    <div class="tb-right">
      <div class="conn-pill offline" id="conn-pill">
        <div class="conn-dot" id="conn-dot"></div>
        <span id="conn-label">Connecting…</span>
      </div>
      <div class="lat-chip">Latency: <b id="lat-ms">—</b> ms</div>
    </div>
  </header>

  <!-- ══════════════════════════════════════════════════════════════
       DIRECTION + DETECTION STRIP — UNCHANGED
       ══════════════════════════════════════════════════════════════ -->
  <div id="dir-strip">
    <span class="ds-label">Direction</span>
    <div class="dir-arrows">
      <div class="dir-btn active" id="darr-UP">↑</div>
      <div class="dir-btn"        id="darr-RIGHT">→</div>
      <div class="dir-btn"        id="darr-DOWN">↓</div>
      <div class="dir-btn"        id="darr-LEFT">←</div>
    </div>
    <div class="det-badges">
      <span class="det-badge b-eye"  id="badge-blink">● Blink</span>
      <span class="det-badge b-dbl"  id="badge-dbl">● Dbl Blink</span>
      <span class="det-badge b-fist" id="badge-fist">● Fist</span>
    </div>
    <div class="ds-text">Current: <strong id="dir-label">UP</strong></div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════
       MAIN CONTENT — UNCHANGED
       ══════════════════════════════════════════════════════════════ -->
  <main id="main">
    <div class="panel-row">

      <!-- Eye EMG Card -->
      <div class="sig-card">
        <div class="sc-head">
          <span class="sc-title eye-col">Eye EMG Signal</span>
          <div class="sc-live">
            <span class="sc-val eye-col" id="eye-val">—</span>
            <span class="sc-unit">μV</span>
          </div>
        </div>
        <div class="sc-chart">
          <canvas id="eye-chart"></canvas>
        </div>
        <div class="sc-thresh">
          <span class="thr-label">Eye Threshold</span>
          <input type="range" class="eye-range" id="eyeSlider"
                 min="100" max="1000" value="500" step="10" />
          <span class="thr-val eye-col" id="eye-thr-display">500</span>
        </div>
      </div>

      <!-- Fist EMG Card -->
      <div class="sig-card">
        <div class="sc-head">
          <span class="sc-title fist-col">Fist EMG Signal</span>
          <div class="sc-live">
            <span class="sc-val fist-col" id="fist-val">—</span>
            <span class="sc-unit">μV</span>
          </div>
        </div>
        <div class="sc-chart">
          <canvas id="fist-chart"></canvas>
        </div>
        <div class="sc-thresh">
          <span class="thr-label">Fist Threshold</span>
          <input type="range" class="fist-range" id="fistSlider"
                 min="100" max="1000" value="600" step="10" />
          <span class="thr-val fist-col" id="fist-thr-display">600</span>
        </div>
      </div>

    </div><!-- /.panel-row -->

    <!-- Event Log -->
    <div class="log-card">
      <div class="lc-head">
        <span class="lc-title">Event Log</span>
        <div class="lc-meta">
          <div class="fb-sync">
            <div class="fb-dot" id="fb-dot"></div>
            <span id="fb-label">Firebase</span>
          </div>
          <div class="ev-count">Events: <b id="ev-total">0</b></div>
        </div>
      </div>
      <div id="log-body"></div>
    </div>

  </main>

  <!-- ══════════════════════════════════════════════════════════════
       FOOTER — UNCHANGED
       ══════════════════════════════════════════════════════════════ -->
  <footer id="footer">
    <span>SynapseLink · synapselink-6c405 · Firebase RTDB</span>
    <span id="uptime-display">Uptime: 0s</span>
  </footer>

</div><!-- /#app -->


<script type="module">

/* ══════════════════════════════════════════════════════════════════════
   SECTION 1 — FIREBASE IMPORTS  ← UNCHANGED
   ══════════════════════════════════════════════════════════════════════ */
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAnalytics }    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
import {
  getDatabase,
  ref,
  set,
  push,
  onValue,
  serverTimestamp,
  runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


/* ══════════════════════════════════════════════════════════════════════
   SECTION 2 — FIREBASE CONFIG  ← UNCHANGED
   ══════════════════════════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey:            "AIzaSyAlVijQ9VdYxLUVujMsg1B1II8Ehj0PpLw",
  authDomain:        "synapselink-6c405.firebaseapp.com",
  databaseURL:       "https://synapselink-6c405-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "synapselink-6c405",
  storageBucket:     "synapselink-6c405.firebasestorage.app",
  messagingSenderId: "760362445061",
  appId:             "1:760362445061:web:9dbc7e89605cf4b0cbef6c",
  measurementId:     "G-ZL5234GQNC"
};

const app       = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db        = getDatabase(app);
const dbRef     = (path) => ref(db, path);

console.log("[SynapseLink] Firebase initialised ✓  project:", firebaseConfig.projectId);


/* ══════════════════════════════════════════════════════════════════════
   SECTION 3 — CONSTANTS & STATE
   ══════════════════════════════════════════════════════════════════════ */
const DATA_POINTS   = 60;
const DEBOUNCE_MS   = 800;
const DBL_WINDOW_MS = 550;

const DIRS      = ['UP', 'RIGHT', 'DOWN', 'LEFT'];
const DIR_CHARS = { UP: '↑', RIGHT: '→', DOWN: '↓', LEFT: '←' };

// ─── DIRECTION CHANGE ────────────────────────────────────────────────
// ❌ REMOVED:  let dirIdx = 0;
//    dirIdx drove cycleDir() which locally computed direction — no longer needed.
//
// ✅ ADDED: currentDir mirrors /direction from Firebase.
//    Python is the sole writer; JS only reads this value.
let currentDir = 'UP';
// ─────────────────────────────────────────────────────────────────────

let lastBlinkAt = 0;
let prevBlinkAt = 0;
let lastFistAt  = 0;

let totalEvents = 0;
const t0        = performance.now();


/* ══════════════════════════════════════════════════════════════════════
   SECTION 4 — CHART.JS SETUP  ← UNCHANGED
   ══════════════════════════════════════════════════════════════════════ */
const makeZeros = (n) => Array(n).fill(0);
const labels    = Array(DATA_POINTS).fill('');

const eyeData  = makeZeros(DATA_POINTS);
const fistData = makeZeros(DATA_POINTS);

function buildChart(canvasId, color, data, initThreshold) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          data,
          borderColor:     color,
          borderWidth:     1.5,
          backgroundColor: color + '12',
          pointRadius:     0,
          tension:         0.35,
          fill:            true,
        },
        {
          data:        Array(DATA_POINTS).fill(initThreshold),
          borderColor: 'rgba(255,255,255,0.13)',
          borderWidth: 1,
          borderDash:  [5, 4],
          pointRadius: 0,
          tension:     0,
          fill:        false,
        }
      ]
    },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      animation:           false,
      scales: {
        x: { display: false },
        y: {
          min: 0, max: 1200,
          grid:   { color: 'rgba(255,255,255,0.04)', drawTicks: false },
          ticks:  { color: '#4a4a62', font: { family: 'JetBrains Mono', size: 10 }, maxTicksLimit: 4, padding: 6 },
          border: { display: false },
        }
      },
      plugins: { legend: { display: false }, tooltip: { enabled: false } }
    }
  });
}

const eyeChart  = buildChart('eye-chart',  '#38b6ff', eyeData,  500);
const fistChart = buildChart('fist-chart', '#ff5c38', fistData, 600);

function setThresholdLine(chart, value) {
  chart.data.datasets[1].data = Array(DATA_POINTS).fill(value);
  chart.update('none');
}


/* ══════════════════════════════════════════════════════════════════════
   SECTION 5 — DOM REFS  ← UNCHANGED
   ══════════════════════════════════════════════════════════════════════ */
const el = (id) => document.getElementById(id);

const $eyeVal      = el('eye-val');
const $fistVal     = el('fist-val');
const $eyeSlider   = el('eyeSlider');
const $fistSlider  = el('fistSlider');
const $eyeThrDisp  = el('eye-thr-display');
const $fistThrDisp = el('fist-thr-display');
const $latMs       = el('lat-ms');
const $dirLabel    = el('dir-label');
const $logBody     = el('log-body');
const $evTotal     = el('ev-total');
const $uptime      = el('uptime-display');
const $connPill    = el('conn-pill');
const $connDot     = el('conn-dot');
const $connLabel   = el('conn-label');
const $fbDot       = el('fb-dot');
const $fbLabel     = el('fb-label');
const $badgeBlink  = el('badge-blink');
const $badgeDbl    = el('badge-dbl');
const $badgeFist   = el('badge-fist');


/* ══════════════════════════════════════════════════════════════════════
   SECTION 6 — FIREBASE REALTIME LISTENERS
   ══════════════════════════════════════════════════════════════════════ */

/* ── 6a. Connection state  ← UNCHANGED ─────────────────────────────── */
onValue(dbRef('.info/connected'), (snap) => {
  const online = snap.val() === true;
  $connPill.className    = 'conn-pill ' + (online ? 'online' : 'offline');
  $connLabel.textContent = online ? 'Connected' : 'Disconnected';
});

/* ── 6b. /signals  ← UNCHANGED ─────────────────────────────────────── */
onValue(dbRef('signals'), (snap) => {
  const data = snap.val();
  if (!data) return;

  const eyeV  = data.eye  ?? 0;
  const fistV = data.fist ?? 0;
  const tStart = performance.now();

  eyeData.shift();  eyeData.push(eyeV);
  fistData.shift(); fistData.push(fistV);
  eyeChart.update('none');
  fistChart.update('none');

  $eyeVal.textContent  = eyeV;
  $fistVal.textContent = fistV;
  $latMs.textContent   = Math.round(performance.now() - tStart);

  flashFb();
  runDetection(eyeV, fistV);
});

/* ── 6c. /thresholds  ← UNCHANGED ──────────────────────────────────── */
onValue(dbRef('thresholds'), (snap) => {
  const data = snap.val();
  if (!data) return;
  if (data.eye  != null) {
    $eyeSlider.value         = data.eye;
    $eyeThrDisp.textContent  = data.eye;
    setThresholdLine(eyeChart, data.eye);
  }
  if (data.fist != null) {
    $fistSlider.value        = data.fist;
    $fistThrDisp.textContent = data.fist;
    setThresholdLine(fistChart, data.fist);
  }
});

/* ── 6d. /events  ← UNCHANGED ──────────────────────────────────────── */
onValue(dbRef('events'), (snap) => {
  /* individual entries handled via pushEvent() below */
});

/* ── 6e. /direction  ← NEW ─────────────────────────────────────────────
   Python backend writes one of: "UP" | "RIGHT" | "DOWN" | "LEFT"
   The dashboard only READS this path — it never writes back.
   This replaces all internal direction-cycling logic.                   */
onValue(dbRef('direction'), (snap) => {
  const dir = snap.val();

  // Ignore null or any value that isn't a recognised direction
  if (!dir || !DIR_CHARS[dir]) return;

  // Keep currentDir in sync so fist log messages show the correct arrow
  currentDir = dir;

  // Update the text label  (id="dir-label")
  $dirLabel.textContent = dir;

  // Remove active from all four arrows, then set only the matching one
  DIRS.forEach(d => el('darr-' + d).classList.remove('active'));
  el('darr-' + dir).classList.add('active');
});


/* ══════════════════════════════════════════════════════════════════════
   SECTION 7 — SLIDER HANDLERS  ← UNCHANGED
   ══════════════════════════════════════════════════════════════════════ */
$eyeSlider.addEventListener('input', () => {
  const v = Number($eyeSlider.value);
  $eyeThrDisp.textContent = v;
  setThresholdLine(eyeChart, v);
  set(dbRef('thresholds/eye'), v);
});

$fistSlider.addEventListener('input', () => {
  const v = Number($fistSlider.value);
  $fistThrDisp.textContent = v;
  setThresholdLine(fistChart, v);
  set(dbRef('thresholds/fist'), v);
});


/* ══════════════════════════════════════════════════════════════════════
   SECTION 8 — DETECTION LOGIC  ← PARTIALLY CHANGED
   ══════════════════════════════════════════════════════════════════════
   WHAT CHANGED:
   • Single blink branch: cycleDir() call removed — direction comes from
     Firebase now, so we just log the blink event.
   • Fist branch: replaced DIRS[dirIdx] with currentDir so the log
     message always matches what Python/Firebase says the direction is.
   • cycleDir() is now a no-op stub (safe if called anywhere by mistake).
   WHAT IS UNCHANGED:
   • Debounce logic, double-blink window, badge flashing — all identical. */

function runDetection(eyeV, fistV) {
  const now     = performance.now();
  const eyeThr  = Number($eyeSlider.value);
  const fistThr = Number($fistSlider.value);

  /* ── Blink / Double-blink ─────────────────────────────────────── */
  if (eyeV > eyeThr && (now - lastBlinkAt) > DEBOUNCE_MS) {
    const isDouble = (now - prevBlinkAt) < DBL_WINDOW_MS;
    prevBlinkAt = lastBlinkAt;
    lastBlinkAt = now;

    if (isDouble) {
      // Double blink → click event  (unchanged)
      pushEvent(
        `<span class="c-dbl">Double Blink</span>` +
        ` → <span class="c-dir">Click triggered</span>`
      );
      flash($badgeDbl);
    } else {
      // Single blink detected.
      // ❌ REMOVED: const dir = cycleDir();
      //    cycleDir() locally mutated direction — direction is now Firebase-only.
      // ✅ Just log the event; the /direction listener updates the UI when
      //    Python writes the new direction to Firebase.
      pushEvent(
        `<span class="c-eye">Blink detected</span>` +
        ` → <span class="c-dir">Direction from Firebase</span>`
      );
      flash($badgeBlink);
    }
  }

  /* ── Fist ─────────────────────────────────────────────────────── */
  if (fistV > fistThr && (now - lastFistAt) > DEBOUNCE_MS) {
    lastFistAt = now;
    // ❌ REMOVED: DIR_CHARS[DIRS[dirIdx]]
    // ✅ CHANGED: use currentDir — synced from Firebase /direction
    const arrow = DIR_CHARS[currentDir] ?? '?';
    pushEvent(
      `<span class="c-fist">Fist detected</span>` +
      ` → Cursor move <span class="c-dir">${arrow}</span>`
    );
    flash($badgeFist);
  }
}

// ❌ REMOVED: cycleDir() body that mutated dirIdx and updated DOM
// ✅ Stubbed as a no-op so any accidental call doesn't throw a ReferenceError
function cycleDir() {
  console.warn('[SynapseLink] cycleDir() is disabled — direction is controlled by Firebase /direction.');
}


/* ══════════════════════════════════════════════════════════════════════
   SECTION 9 — EVENT LOG  ← UNCHANGED
   ══════════════════════════════════════════════════════════════════════ */
function pushEvent(htmlMsg) {
  const ts = new Date().toTimeString().slice(0, 8);
  prependRow(ts, htmlMsg);
  push(dbRef('events'), {
    ts,
    html:    htmlMsg,
    created: serverTimestamp()
  });
}

function prependRow(ts, html) {
  const row = document.createElement('div');
  row.className = 'log-row';
  row.innerHTML =
    `<span class="log-ts">[${ts}]</span>` +
    `<span class="log-txt">${html}</span>`;
  $logBody.insertBefore(row, $logBody.firstChild);
  $evTotal.textContent = ++totalEvents;
}


/* ══════════════════════════════════════════════════════════════════════
   SECTION 10 — THRESHOLD SEED  ← UNCHANGED
   ══════════════════════════════════════════════════════════════════════ */
runTransaction(dbRef('thresholds'), (current) => {
  if (current === null) return { eye: 500, fist: 600 };
  return current;
}).then(() => {
  console.log("[SynapseLink] /thresholds seeded ✓");
}).catch(console.error);


/* ══════════════════════════════════════════════════════════════════════
   SECTION 11 — UTILITY HELPERS  ← UNCHANGED
   ══════════════════════════════════════════════════════════════════════ */
function flash(badge) {
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 750);
}

let fbTimer;
function flashFb() {
  $fbDot.classList.add('pulse');
  $fbLabel.textContent = 'Synced';
  clearTimeout(fbTimer);
  fbTimer = setTimeout(() => {
    $fbDot.classList.remove('pulse');
    $fbLabel.textContent = 'Firebase';
  }, 380);
}

setInterval(() => {
  const sec = Math.floor((performance.now() - t0) / 1000);
  const m   = Math.floor(sec / 60).toString().padStart(2, '0');
  const s   = (sec % 60).toString().padStart(2, '0');
  $uptime.textContent = `Uptime: ${m}:${s}`;
}, 1000);

</script>
