<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMG Control Dashboard</title>

  <!-- Chart.js via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <!-- Google Fonts: JetBrains Mono for monospace data, DM Sans for UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── CSS Variables ──────────────────────────────────────────── */
    :root {
      --bg:          #0d0d0f;
      --surface:     #131318;
      --surface2:    #1a1a22;
      --border:      #26262f;
      --text:        #d4d4dc;
      --text-muted:  #5a5a72;
      --accent-eye:  #3b9eff;
      --accent-fist: #ff6b3b;
      --green:       #2dca73;
      --yellow:      #f5c842;
      --mono:        'JetBrains Mono', monospace;
      --sans:        'DM Sans', sans-serif;
    }

    /* ─── Reset & Base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ─── Page Layout ────────────────────────────────────────────── */
    #app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      padding: 0;
    }

    /* ─── Header ─────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .header-left h1 {
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #fff;
    }
    .header-left span {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }
    .latency-display {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
    }
    .latency-display span {
      color: var(--yellow);
      font-weight: 600;
    }

    /* ─── Main Content ───────────────────────────────────────────── */
    main {
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Top row: direction + panels */
    .top-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* ─── Direction Bar ──────────────────────────────────────────── */
    .direction-bar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .direction-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 500;
    }
    .direction-arrows {
      display: flex;
      gap: 8px;
    }
    .dir-arrow {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      border: 1px solid var(--border);
      font-size: 14px;
      color: var(--text-muted);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .dir-arrow.active {
      background: rgba(59, 158, 255, 0.12);
      border-color: var(--accent-eye);
      color: var(--accent-eye);
    }
    .direction-text {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }
    .direction-text strong {
      color: var(--accent-eye);
    }

    /* ─── Signal Panel ───────────────────────────────────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }
    .panel-value {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 600;
    }
    .panel-value.eye  { color: var(--accent-eye); }
    .panel-value.fist { color: var(--accent-fist); }
    .panel-value-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-align: right;
      line-height: 1.2;
    }

    /* Chart area */
    .chart-wrap {
      padding: 12px 16px 8px;
      height: 200px;
      position: relative;
    }
    .chart-wrap canvas {
      display: block;
    }

    /* Threshold control */
    .threshold-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px 14px;
      border-top: 1px solid var(--border);
    }
    .threshold-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      white-space: nowrap;
      min-width: 100px;
      text-transform: uppercase;
      font-weight: 500;
    }
    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      cursor: pointer;
    }
    .eye-slider::-webkit-slider-thumb   { background: var(--accent-eye); }
    .fist-slider::-webkit-slider-thumb { background: var(--accent-fist); }
    .eye-slider::-webkit-slider-runnable-track  { background: var(--border); }
    .fist-slider::-webkit-slider-runnable-track { background: var(--border); }
    .threshold-value {
      font-family: var(--mono);
      font-size: 12px;
      min-width: 36px;
      text-align: right;
    }
    .threshold-value.eye  { color: var(--accent-eye); }
    .threshold-value.fist { color: var(--accent-fist); }

    /* Detection badge */
    .detect-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      font-family: var(--mono);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .detect-badge.visible { opacity: 1; }
    .detect-badge.eye {
      background: rgba(59, 158, 255, 0.15);
      color: var(--accent-eye);
      border: 1px solid rgba(59, 158, 255, 0.3);
    }
    .detect-badge.fist {
      background: rgba(255, 107, 59, 0.15);
      color: var(--accent-fist);
      border: 1px solid rgba(255, 107, 59, 0.3);
    }

    /* ─── Event Log ──────────────────────────────────────────────── */
    .event-log-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .log-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .log-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
    }
    #event-log {
      height: 160px;
      overflow-y: auto;
      padding: 8px 0;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.8;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #event-log::-webkit-scrollbar { width: 4px; }
    #event-log::-webkit-scrollbar-track { background: transparent; }
    #event-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-entry {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 0 16px;
      animation: fadeIn 0.2s ease;
    }
    .log-entry:hover { background: rgba(255,255,255,0.02); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

    .log-time {
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .log-msg { color: var(--text); }
    .log-msg .hl-eye  { color: var(--accent-eye); }
    .log-msg .hl-fist { color: var(--accent-fist); }
    .log-msg .hl-dir  { color: var(--yellow); }

    /* ─── Footer ─────────────────────────────────────────────────── */
    footer {
      padding: 10px 28px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--mono);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ═══ HEADER ═══════════════════════════════════════════════════ -->
  <header>
    <div class="header-left">
      <h1>EMG Control Dashboard</h1>
      <span>Electromyographic Signal Monitor · v1.0</span>
    </div>
    <div class="header-right">
      <div class="status-badge">
        <div class="status-dot"></div>
        Connected
      </div>
      <div class="latency-display">
        Latency: <span id="latency-ms">0</span> ms
      </div>
    </div>
  </header>

  <!-- ═══ MAIN ══════════════════════════════════════════════════════ -->
  <main>

    <!-- Direction indicator bar -->
    <div class="direction-bar">
      <span class="direction-label">Direction</span>
      <div class="direction-arrows">
        <div class="dir-arrow active" id="dir-up"    title="Up">↑</div>
        <div class="dir-arrow"        id="dir-right" title="Right">→</div>
        <div class="dir-arrow"        id="dir-down"  title="Down">↓</div>
        <div class="dir-arrow"        id="dir-left"  title="Left">←</div>
      </div>
      <div class="direction-text">
        Current: <strong id="dir-label">UP</strong>
      </div>
    </div>

    <!-- Two-panel grid -->
    <div class="top-row">

      <!-- ── LEFT: Eye EMG ── -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Eye EMG Signal</span>
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="detect-badge eye" id="eye-badge">● Blink</span>
            <div>
              <div class="panel-value eye" id="eye-value">0</div>
              <div class="panel-value-label">μV · RAW</div>
            </div>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="eye-chart"></canvas>
        </div>
        <div class="threshold-row">
          <span class="threshold-label">Eye Threshold</span>
          <input type="range" class="eye-slider" id="eye-threshold"
                 min="100" max="1000" value="500" step="10" />
          <span class="threshold-value eye" id="eye-thresh-val">500</span>
        </div>
      </div>

      <!-- ── RIGHT: Fist EMG ── -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Fist EMG Signal</span>
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="detect-badge fist" id="fist-badge">● Fist</span>
            <div>
              <div class="panel-value fist" id="fist-value">0</div>
              <div class="panel-value-label">μV · RAW</div>
            </div>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="fist-chart"></canvas>
        </div>
        <div class="threshold-row">
          <span class="threshold-label">Fist Threshold</span>
          <input type="range" class="fist-slider" id="fist-threshold"
                 min="100" max="1000" value="600" step="10" />
          <span class="threshold-value fist" id="fist-thresh-val">600</span>
        </div>
      </div>

    </div><!-- /.top-row -->

    <!-- ── EVENT LOG ── -->
    <div class="event-log-section">
      <div class="log-header">
        <span class="log-title">Event Log</span>
        <span class="log-count">Events: <span id="event-count">0</span></span>
      </div>
      <div id="event-log">
        <!-- Entries prepended here by JS -->
      </div>
    </div>

  </main>

  <!-- ═══ FOOTER ════════════════════════════════════════════════════ -->
  <footer>
    <span>EMG Dashboard · Science Project Demo</span>
    <span id="runtime">Uptime: 0s</span>
  </footer>

</div><!-- /#app -->

<script>
/* ═══════════════════════════════════════════════════════════════════
   EMG CONTROL DASHBOARD — Main Script
   ══════════════════════════════════════════════════════════════════ */

// ── Constants ─────────────────────────────────────────────────────
const DATA_POINTS    = 60;     // number of visible samples on chart
const UPDATE_INTERVAL= 200;    // ms between data refreshes
const SPIKE_CHANCE   = 0.08;   // probability of a spike per tick
const SPIKE_MIN      = 700;    // spike value range min
const SPIKE_MAX      = 1100;   // spike value range max
const BASE_MIN       = 50;     // baseline noise min
const BASE_MAX       = 300;    // baseline noise max
const COOLDOWN_MS    = 800;    // min ms between detections (debounce)

// ── Direction state ───────────────────────────────────────────────
const DIRECTIONS     = ['UP', 'RIGHT', 'DOWN', 'LEFT'];
const DIR_ARROWS     = { UP: '↑', RIGHT: '→', DOWN: '↓', LEFT: '←' };
const DIR_IDS        = { UP: 'dir-up', RIGHT: 'dir-right', DOWN: 'dir-down', LEFT: 'dir-left' };
let   dirIndex       = 0;   // index into DIRECTIONS

// Cooldown trackers
let lastBlinkTime  = 0;
let lastFistTime   = 0;
let eventCount     = 0;
const startTime    = performance.now();

// ── Build initial zero-filled data arrays ─────────────────────────
const makeArray = (len, val = 0) => Array(len).fill(val);
const eyeData   = makeArray(DATA_POINTS);
const fistData  = makeArray(DATA_POINTS);
const labels    = makeArray(DATA_POINTS, '');

// ── Chart factory ─────────────────────────────────────────────────
function makeChart(canvasId, color, thresholdValue) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          // Raw EMG signal
          label: 'EMG',
          data: canvasId === 'eye-chart' ? eyeData : fistData,
          borderColor: color,
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.3,
          fill: true,
          backgroundColor: hexToRgba(color, 0.06),
        },
        {
          // Threshold line
          label: 'Threshold',
          data: makeArray(DATA_POINTS, thresholdValue),
          borderColor: 'rgba(255,255,255,0.15)',
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          tension: 0,
          fill: false,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,   // disable for real-time performance
      scales: {
        x: { display: false },
        y: {
          min: 0,
          max: 1200,
          grid: {
            color: 'rgba(255,255,255,0.05)',
            drawTicks: false,
          },
          ticks: {
            color: '#5a5a72',
            font: { family: 'JetBrains Mono', size: 10 },
            maxTicksLimit: 5,
            padding: 6,
          },
          border: { display: false },
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false },
      },
    }
  });
}

// ── Utility: hex color → rgba ──────────────────────────────────────
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Init charts ───────────────────────────────────────────────────
const eyeChart  = makeChart('eye-chart',  '#3b9eff', 500);
const fistChart = makeChart('fist-chart', '#ff6b3b', 600);

// ── DOM refs ──────────────────────────────────────────────────────
const eyeValueEl    = document.getElementById('eye-value');
const fistValueEl   = document.getElementById('fist-value');
const eyeThreshEl   = document.getElementById('eye-threshold');
const fistThreshEl  = document.getElementById('fist-threshold');
const eyeThreshVal  = document.getElementById('eye-thresh-val');
const fistThreshVal = document.getElementById('fist-thresh-val');
const latencyEl     = document.getElementById('latency-ms');
const dirLabelEl    = document.getElementById('dir-label');
const eventLog      = document.getElementById('event-log');
const eventCountEl  = document.getElementById('event-count');
const runtimeEl     = document.getElementById('runtime');
const eyeBadge      = document.getElementById('eye-badge');
const fistBadge     = document.getElementById('fist-badge');

// ── Slider → threshold display sync ───────────────────────────────
eyeThreshEl.addEventListener('input', () => {
  const v = +eyeThreshEl.value;
  eyeThreshVal.textContent = v;
  // Update threshold dashed line on chart
  eyeChart.data.datasets[1].data = makeArray(DATA_POINTS, v);
  eyeChart.update('none');
});

fistThreshEl.addEventListener('input', () => {
  const v = +fistThreshEl.value;
  fistThreshVal.textContent = v;
  fistChart.data.datasets[1].data = makeArray(DATA_POINTS, v);
  fistChart.update('none');
});

// ── EMG signal generator (simulated) ─────────────────────────────
/**
 * Generates a realistic-looking EMG sample.
 * Most of the time it's low-level noise; occasionally a spike occurs.
 */
function generateEMG() {
  if (Math.random() < SPIKE_CHANCE) {
    // Spike: simulate muscle activation
    return Math.round(SPIKE_MIN + Math.random() * (SPIKE_MAX - SPIKE_MIN));
  }
  // Baseline noise
  return Math.round(BASE_MIN + Math.random() * (BASE_MAX - BASE_MIN));
}

// ── Direction helper ──────────────────────────────────────────────
function updateDirection() {
  dirIndex = (dirIndex + 1) % DIRECTIONS.length;
  const dir = DIRECTIONS[dirIndex];

  // Update arrow highlights
  Object.values(DIR_IDS).forEach(id =>
    document.getElementById(id).classList.remove('active')
  );
  document.getElementById(DIR_IDS[dir]).classList.add('active');
  dirLabelEl.textContent = dir;
  return dir;
}

// ── Event log helper ──────────────────────────────────────────────
function logEvent(type, detail) {
  const now  = new Date();
  const time = now.toTimeString().slice(0, 8);

  const entry = document.createElement('div');
  entry.className = 'log-entry';

  let msgHtml;
  if (type === 'blink') {
    msgHtml = `<span class="hl-eye">Blink detected</span> → Direction changed to <span class="hl-dir">${detail}</span>`;
  } else {
    msgHtml = `<span class="hl-fist">Fist detected</span> → <span class="hl-dir">Cursor move ${DIR_ARROWS[DIRECTIONS[dirIndex]]}</span>`;
  }

  entry.innerHTML = `
    <span class="log-time">[${time}]</span>
    <span class="log-msg">${msgHtml}</span>
  `;

  // Prepend: newest at top
  eventLog.insertBefore(entry, eventLog.firstChild);

  eventCount++;
  eventCountEl.textContent = eventCount;
}

// ── Flash detection badge ─────────────────────────────────────────
function flashBadge(badge) {
  badge.classList.add('visible');
  setTimeout(() => badge.classList.remove('visible'), 700);
}

// ── Main update loop ──────────────────────────────────────────────
function update() {
  const t0   = performance.now();

  // Generate new EMG samples
  const eyeVal  = generateEMG();
  const fistVal = generateEMG();

  // Push to rolling data arrays (shift oldest, append newest)
  eyeData.shift();  eyeData.push(eyeVal);
  fistData.shift(); fistData.push(fistVal);

  // Update chart data and re-render
  eyeChart.update('none');
  fistChart.update('none');

  // Update raw value displays
  eyeValueEl.textContent  = eyeVal;
  fistValueEl.textContent = fistVal;

  // Read current threshold values
  const eyeThresh  = +eyeThreshEl.value;
  const fistThresh = +fistThreshEl.value;
  const now        = performance.now();

  // ── Detection logic ──────────────────────────────────────────
  // Eye blink: value exceeds threshold + cooldown debounce
  if (eyeVal > eyeThresh && (now - lastBlinkTime) > COOLDOWN_MS) {
    lastBlinkTime = now;
    const newDir  = updateDirection();
    logEvent('blink', newDir);
    flashBadge(eyeBadge);
  }

  // Fist: value exceeds threshold + cooldown debounce
  if (fistVal > fistThresh && (now - lastFistTime) > COOLDOWN_MS) {
    lastFistTime = now;
    logEvent('fist');
    flashBadge(fistBadge);
  }

  // Measure update latency
  const latency = Math.round(performance.now() - t0);
  latencyEl.textContent = latency;

  // Update uptime counter
  const uptimeSec = Math.floor((performance.now() - startTime) / 1000);
  runtimeEl.textContent = `Uptime: ${uptimeSec}s`;
}

// ── Start the update loop ─────────────────────────────────────────
setInterval(update, UPDATE_INTERVAL);

// Initial tick immediately
update();
</script>
</body>
</html>
